name: Build APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      publish_release:
        description: "Upload to GitHub Releases"
        required: true
        default: false
        type: boolean
      abi:
        description: "APK ABI"
        required: true
        default: "arm64-v8a"
        type: choice
        options:
          - universal
          - arm64-v8a
          - armeabi-v7a
          - x86
          - x86_64

jobs:
  build:
    name: Build ${{ inputs.abi || 'arm64-v8a' }} ${{ inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      APP_NAME: SkynetVPN
      APP_VERSION: 1.0.1
      BUILD_TYPE: ${{ inputs.build_type || (startsWith(github.ref, 'refs/tags/') && 'release' || 'debug') }}
      TARGET_ABI: ${{ inputs.abi || 'arm64-v8a' }}
      GRADLE_VERSION: 8.5
      KEYSTORE_BASE64: ${{ secrets.SKYNETVPN_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle command
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            curl -L "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o gradle.zip
            unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
            echo "GRADLE_CMD=$RUNNER_TEMP/gradle/gradle-${GRADLE_VERSION}/bin/gradle" >> "$GITHUB_ENV"
          fi

      - name: Decode release keystore
        if: env.BUILD_TYPE == 'release' && env.KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/skynetvpn-release.jks"
          echo "SKYNETVPN_KEYSTORE_PATH=$RUNNER_TEMP/skynetvpn-release.jks" >> "$GITHUB_ENV"
          echo "SKYNETVPN_KEYSTORE_PASSWORD=${{ secrets.SKYNETVPN_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SKYNETVPN_KEY_ALIAS=${{ secrets.SKYNETVPN_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "SKYNETVPN_KEY_PASSWORD=${{ secrets.SKYNETVPN_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Download VPN core binaries
        shell: bash
        run: |
          set -e
          if [ "$TARGET_ABI" != "arm64-v8a" ] && [ "$TARGET_ABI" != "universal" ]; then
            echo "Automatic core download currently supports arm64-v8a and universal only."
            echo "Selected ABI: $TARGET_ABI"
            exit 1
          fi

          CORE_ABI="arm64-v8a"
          echo "Bundling VPN core for ABI: $CORE_ABI"

          mkdir -p "app/src/main/assets/xray/$CORE_ABI"
          mkdir -p "app/src/main/jniLibs/$CORE_ABI"

          XRAY_URL="$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | grep browser_download_url \
            | grep 'Xray-android-arm64-v8a.zip"' \
            | cut -d '"' -f 4 \
            | head -n 1)"
          if [ -z "$XRAY_URL" ]; then
            echo "Failed to find Xray android arm64-v8a release asset"
            exit 1
          fi
          curl -L "$XRAY_URL" -o xray.zip
          unzip -q xray.zip -d xray-dist
          find xray-dist -type f -name xray -exec cp {} "app/src/main/jniLibs/$CORE_ABI/libxray.so" \;
          find xray-dist -type f -name geoip.dat -exec cp {} "app/src/main/assets/xray/$CORE_ABI/geoip.dat" \; || true
          find xray-dist -type f -name geosite.dat -exec cp {} "app/src/main/assets/xray/$CORE_ABI/geosite.dat" \; || true

          TUN_URL="$(curl -s https://api.github.com/repos/xjasonlyu/tun2socks/releases/latest \
            | grep browser_download_url \
            | grep 'tun2socks-linux-arm64.zip"' \
            | cut -d '"' -f 4 \
            | head -n 1)"
          if [ -z "$TUN_URL" ]; then
            echo "Failed to find tun2socks linux arm64 release asset"
            exit 1
          fi
          curl -L "$TUN_URL" -o tun2socks.zip
          unzip -q tun2socks.zip -d tun2socks-dist
          TUN_BIN="$(find tun2socks-dist -type f -name 'tun2socks*' | head -n 1)"
          if [ -z "$TUN_BIN" ]; then
            echo "tun2socks binary not found inside release zip"
            find tun2socks-dist -type f -print
            exit 1
          fi
          cp "$TUN_BIN" "app/src/main/jniLibs/$CORE_ABI/libtun2socks.so"

          test -f "app/src/main/jniLibs/$CORE_ABI/libxray.so"
          test -f "app/src/main/jniLibs/$CORE_ABI/libtun2socks.so"

      - name: Keep selected ABI native assets
        shell: bash
        run: |
          if [ "$TARGET_ABI" = "universal" ]; then
            echo "Keeping all ABI native assets for universal APK"
            exit 0
          fi
          for family in xray tun2socks; do
            base="app/src/main/assets/$family"
            if [ -d "$base" ]; then
              find "$base" -mindepth 1 -maxdepth 1 -type d ! -name "$TARGET_ABI" -exec rm -rf {} +
            fi
          done

      - name: Build APK
        shell: bash
        run: |
          set -e
          TASK="assemble$(tr '[:lower:]' '[:upper:]' <<< ${BUILD_TYPE:0:1})${BUILD_TYPE:1}"
          echo "Running Gradle task: $TASK"
          "$GRADLE_CMD" "$TASK" --no-daemon
          echo "Generated APK files:"
          find app/build/outputs/apk -type f -name "*.apk" -print || true

      - name: Collect ABI APK
        shell: bash
        run: |
          mkdir -p dist
          if [ "$TARGET_ABI" = "universal" ]; then
            APK_PATH="$(find app/build/outputs/apk -type f -name "*.apk" | grep "$BUILD_TYPE" | grep "universal" | grep -v "unsigned" | head -n 1)"
          else
            APK_PATH="$(find app/build/outputs/apk -type f -name "*.apk" | grep "$BUILD_TYPE" | grep "$TARGET_ABI" | grep -v "unsigned" | head -n 1)"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK found for ABI: $TARGET_ABI"
            echo "Available APK files:"
            find app/build/outputs/apk -type f -name "*.apk" -print
            exit 1
          fi

          if [ "$BUILD_TYPE" = "release" ]; then
            OUT_NAME="${APP_NAME}-${APP_VERSION}-${TARGET_ABI}.apk"
          else
            OUT_NAME="${APP_NAME}-${APP_VERSION}-${TARGET_ABI}-${BUILD_TYPE}.apk"
          fi
          cp "$APK_PATH" "dist/$OUT_NAME"
          echo "APK_OUT=dist/$OUT_NAME" >> "$GITHUB_ENV"

      - name: Upload ABI APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.APP_VERSION }}-${{ env.TARGET_ABI }}-${{ env.BUILD_TYPE }}
          path: ${{ env.APK_OUT }}
          if-no-files-found: error

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: ${{ env.APP_NAME }} ${{ env.APP_VERSION }}
          files: ${{ env.APK_OUT }}
