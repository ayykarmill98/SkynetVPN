name: Build APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      publish_release:
        description: "Upload to GitHub Releases"
        required: true
        default: false
        type: boolean
      app_version:
        description: "App/release version, example: 1.0.8"
        required: true
        default: "1.0.8"
        type: string
      version_code:
        description: "Android versionCode, must increase each release"
        required: true
        default: "9"
        type: string
      release_tag:
        description: "GitHub release tag, leave empty to use v<app_version>"
        required: false
        default: ""
        type: string
      abi:
        description: "APK ABI"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - universal
          - arm64-v8a
          - x86_64

jobs:
  build:
    name: Build ${{ matrix.abi }} ${{ inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        abi: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.abi != 'all' && format('["{0}"]', inputs.abi) || '["arm64-v8a","x86_64","universal"]') }}

    env:
      APP_NAME: SkynetVPN
      APP_VERSION: ${{ inputs.app_version || '1.0.8' }}
      APP_VERSION_NAME: ${{ inputs.app_version || '1.0.8' }}
      APP_VERSION_CODE: ${{ inputs.version_code || '9' }}
      RELEASE_TAG: ${{ inputs.release_tag || '' }}
      BUILD_TYPE: ${{ inputs.build_type || (startsWith(github.ref, 'refs/tags/') && 'release' || 'debug') }}
      TARGET_ABI: ${{ matrix.abi }}
      GRADLE_VERSION: 8.5
      KEYSTORE_BASE64: ${{ secrets.SKYNETVPN_KEYSTORE_BASE64 }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle command
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "GRADLE_CMD=./gradlew" >> "$GITHUB_ENV"
          else
            curl -L "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o gradle.zip
            unzip -q gradle.zip -d "$RUNNER_TEMP/gradle"
            echo "GRADLE_CMD=$RUNNER_TEMP/gradle/gradle-${GRADLE_VERSION}/bin/gradle" >> "$GITHUB_ENV"
          fi

      - name: Prepare release version
        shell: bash
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "RELEASE_TAG=v${APP_VERSION}" >> "$GITHUB_ENV"
          fi
          echo "Building app version ${APP_VERSION} (${APP_VERSION_CODE})"

      - name: Decode release keystore
        if: env.BUILD_TYPE == 'release' && env.KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/skynetvpn-release.jks"
          echo "SKYNETVPN_KEYSTORE_PATH=$RUNNER_TEMP/skynetvpn-release.jks" >> "$GITHUB_ENV"
          echo "SKYNETVPN_KEYSTORE_PASSWORD=${{ secrets.SKYNETVPN_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SKYNETVPN_KEY_ALIAS=${{ secrets.SKYNETVPN_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "SKYNETVPN_KEY_PASSWORD=${{ secrets.SKYNETVPN_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build tun2socks engine AAR
        shell: bash
        run: |
          set -e
          mkdir -p app/libs
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          git clone --depth 1 https://github.com/xjasonlyu/tun2socks.git "$RUNNER_TEMP/tun2socks"
          cd "$RUNNER_TEMP/tun2socks"
          go get -tool golang.org/x/mobile/cmd/gobind
          go mod tidy
          case "$TARGET_ABI" in
            arm64-v8a) GOMOBILE_TARGET="android/arm64" ;;
            x86_64) GOMOBILE_TARGET="android/amd64" ;;
            universal) GOMOBILE_TARGET="android" ;;
            *) echo "Unsupported ABI for tun2socks: $TARGET_ABI"; exit 1 ;;
          esac
          gomobile bind -o "$GITHUB_WORKSPACE/app/libs/tun2socks.aar" -target "$GOMOBILE_TARGET" -androidapi 26 ./engine
          test -f "$GITHUB_WORKSPACE/app/libs/tun2socks.aar"

      - name: Download VPN core binaries
        shell: bash
        run: |
          set -e
          api_header=(-H "Accept: application/vnd.github+json" -H "User-Agent: SkynetVPN-build")
          if [ -n "$GITHUB_TOKEN" ]; then
            api_header+=(-H "Authorization: Bearer $GITHUB_TOKEN")
          fi

          download_xray() {
            local core_abi="$1"
            local asset_name="$2"
            local work_dir="xray-dist-$core_abi"
            local zip_file="xray-$core_abi.zip"

            echo "Bundling VPN core for ABI: $core_abi from $asset_name"
            mkdir -p "app/src/main/assets/xray/$core_abi"
            mkdir -p "app/src/main/jniLibs/$core_abi"

            local xray_url
            xray_url="$(curl -fsSL "${api_header[@]}" https://api.github.com/repos/XTLS/Xray-core/releases/latest \
              | jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .browser_download_url' \
              | head -n 1)"
            if [ -z "$xray_url" ]; then
              echo "Failed to find Xray release asset: $asset_name"
              echo "Available Android assets:"
              curl -fsSL "${api_header[@]}" https://api.github.com/repos/XTLS/Xray-core/releases/latest \
                | jq -r '.assets[].name' \
                | grep '^Xray-android' || true
              exit 1
            fi

            echo "Downloading $xray_url"
            curl -fL --retry 3 --retry-delay 2 --connect-timeout 30 "$xray_url" -o "$zip_file"
            if ! unzip -tq "$zip_file"; then
              echo "Downloaded Xray asset is not a valid zip: $zip_file"
              echo "File size:"
              ls -lh "$zip_file"
              echo "First bytes:"
              head -c 200 "$zip_file" || true
              exit 1
            fi

            rm -rf "$work_dir"
            unzip -q "$zip_file" -d "$work_dir"
            find "$work_dir" -type f -name xray -exec cp {} "app/src/main/jniLibs/$core_abi/libxray.so" \;
            find "$work_dir" -type f -name geoip.dat -exec cp {} "app/src/main/assets/xray/$core_abi/geoip.dat" \; || true
            find "$work_dir" -type f -name geosite.dat -exec cp {} "app/src/main/assets/xray/$core_abi/geosite.dat" \; || true
            test -f "app/src/main/jniLibs/$core_abi/libxray.so"
          }

          case "$TARGET_ABI" in
            arm64-v8a)
              download_xray "arm64-v8a" "Xray-android-arm64-v8a.zip"
              ;;
            x86_64)
              download_xray "x86_64" "Xray-android-amd64.zip"
              ;;
            universal)
              download_xray "arm64-v8a" "Xray-android-arm64-v8a.zip"
              download_xray "x86_64" "Xray-android-amd64.zip"
              ;;
            *)
              echo "Unsupported ABI: $TARGET_ABI"
              echo "Supported ABI values: arm64-v8a, x86_64, universal"
              exit 1
              ;;
          esac

      - name: Keep selected ABI native assets
        shell: bash
        run: |
          if [ "$TARGET_ABI" = "universal" ]; then
            echo "Keeping all ABI native assets for universal APK"
            exit 0
          fi
          for family in xray tun2socks; do
            base="app/src/main/assets/$family"
            if [ -d "$base" ]; then
              find "$base" -mindepth 1 -maxdepth 1 -type d ! -name "$TARGET_ABI" -exec rm -rf {} +
            fi
          done
          base="app/src/main/jniLibs"
          if [ -d "$base" ]; then
            find "$base" -mindepth 1 -maxdepth 1 -type d ! -name "$TARGET_ABI" -exec rm -rf {} +
          fi

      - name: Build APK
        shell: bash
        run: |
          set -e
          TASK="assemble$(tr '[:lower:]' '[:upper:]' <<< ${BUILD_TYPE:0:1})${BUILD_TYPE:1}"
          echo "Running Gradle task: $TASK"
          "$GRADLE_CMD" "$TASK" --no-daemon
          echo "Generated APK files:"
          find app/build/outputs/apk -type f -name "*.apk" -print || true

      - name: Collect ABI APK
        shell: bash
        run: |
          mkdir -p dist
          if [ "$TARGET_ABI" = "universal" ]; then
            APK_PATH="$(find app/build/outputs/apk -type f -name "*.apk" | grep "$BUILD_TYPE" | grep -E "universal|app-${BUILD_TYPE}\\.apk" | grep -v "unsigned" | head -n 1)"
          else
            APK_PATH="$(find app/build/outputs/apk -type f -name "*.apk" | grep "$BUILD_TYPE" | grep "$TARGET_ABI" | grep -v "unsigned" | head -n 1)"
          fi
          if [ -z "$APK_PATH" ]; then
            echo "No APK found for ABI: $TARGET_ABI"
            echo "Available APK files:"
            find app/build/outputs/apk -type f -name "*.apk" -print
            exit 1
          fi

          if [ "$BUILD_TYPE" = "release" ]; then
            OUT_NAME="${APP_NAME}-${APP_VERSION}-${TARGET_ABI}.apk"
          else
            OUT_NAME="${APP_NAME}-${APP_VERSION}-${TARGET_ABI}-${BUILD_TYPE}.apk"
          fi
          cp "$APK_PATH" "dist/$OUT_NAME"
          echo "APK_OUT=dist/$OUT_NAME" >> "$GITHUB_ENV"

      - name: Upload ABI APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.APP_VERSION }}-${{ env.TARGET_ABI }}-${{ env.BUILD_TYPE }}
          path: ${{ env.APK_OUT }}
          if-no-files-found: error

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.APP_NAME }} ${{ env.APP_VERSION }}
          files: ${{ env.APK_OUT }}
